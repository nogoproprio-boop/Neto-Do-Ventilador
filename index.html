<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neto do Ventilador</title>

    <link rel="stylesheet" href="style.css">

    <!-- Ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>
<body>

<header class="topo">

    <div class="logo">
        <!-- Depois substitua pela sua logo -->
        <img src="logo.png" alt="Logo da Loja">
    </div>

    <h1>Neto do Ventilador</h1>

    <p>Assistência Técnica Especializada em Eletrodomésticos</p>

</header>

<main>

    <div class="card">
        <i class="fa-solid fa-location-dot"></i>

        <h2>Como chegar</h2>

        <a href="#" class="botao">
            Abrir no Google Maps
        </a>
    </div>

    <div class="card">

        <i class="fa-brands fa-whatsapp"></i>

        <h2>Contato</h2>

        <a href="https://wa.me/5598999730253" class="botao">
            Falar no WhatsApp
        </a>

    </div>

    <div class="card">

        <i class="fa-solid fa-clock"></i>

        <h2>Nossos Horários</h2>

        <p><strong>Segunda a Sexta</strong><br>07:30 às 18:30</p>

        <p><strong>Sábado</strong><br>07:30 às 16:00</p>

        <p><strong>Domingo</strong><br>07:30 às 12:00</p>

    </div>

    <div class="card">

        <i class="fa-solid fa-calendar-check"></i>

        <h2>Agende uma visita</h2>

        <form>

            <input type="text" placeholder="Nome">

            <input type="tel" placeholder="Telefone">

            <input type="text" placeholder="Endereço">

            <input type="text" placeholder="Eletrodoméstico">

            <textarea placeholder="Descreva o problema"></textarea>

            <button class="botao">
                Agendar pelo WhatsApp
            </button>

        </form>

    </div>

</main>

<footer>

<p>© 2026 Neto do Ventilador</p>

</footer>

<script src="script.js"></script>

</body>
</html>
